name: Production — Deploy após aprovação

on:
  push:
    branches: ["main"]

jobs:
  # ── 1. CI obrigatório ──────────────────────────────────────────
  ci:
    name: Lint + Build + Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm run test

  # ── 2. Deploy em produção (requer aprovação manual) ────────────
  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [ci]

    # 🔒 Este ambiente exige aprovação de um revisor antes de rodar.
    # Configure em: Settings → Environments → production → Required reviewers
    environment:
      name: production
      url: ${{ steps.deploy.outputs.production_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (production)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (production)
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "production_url=$URL" >> $GITHUB_OUTPUT

      - name: Print production URL
        run: echo "✅ Deployed to ${{ steps.deploy.outputs.production_url }}"
