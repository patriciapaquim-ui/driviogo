name: Production — Deploy após aprovação (Hostinger)

on:
  push:
    branches: ["main"]

# ─────────────────────────────────────────────────────────────────
# Secrets necessários (Settings → Secrets → Actions):
#   FTP_SERVER                   ex: ftp.seudominio.com.br
#   FTP_USERNAME                 usuário FTP da Hostinger
#   FTP_PASSWORD                 senha FTP da Hostinger
#   FTP_PRODUCTION_PATH          caminho remoto  ex: /public_html/
#   VITE_SUPABASE_URL
#   VITE_SUPABASE_PUBLISHABLE_KEY
#
# Ambiente de produção com aprovação:
#   Settings → Environments → production → Required reviewers
# ─────────────────────────────────────────────────────────────────

jobs:
  # ── 1. CI obrigatório ──────────────────────────────────────────
  ci:
    name: Lint + Build + Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Run tests
        run: npm run test

      # Salva o artefato do build para o job de deploy usar
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ── 2. Deploy em produção (requer aprovação manual) ────────────
  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [ci]

    # 🔒 Aguarda aprovação manual antes de executar.
    # Configure em: Settings → Environments → production → Required reviewers
    environment:
      name: production

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Upload para Hostinger (Produção) via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ${{ secrets.FTP_PRODUCTION_PATH }}
          dangerous-clean-slate: false

      - name: Deploy concluído
        run: echo "✅ Deploy em produção finalizado com sucesso."
