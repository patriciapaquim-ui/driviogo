name: Preview — Deploy PR para Hostinger (Staging)

on:
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened]

# ─────────────────────────────────────────────────────────────────
# Pré-requisito: crie um subdomínio de staging na Hostinger
# Exemplo: staging.seudominio.com.br → pasta /staging no hPanel
#
# Secrets necessários (Settings → Secrets → Actions):
#   FTP_SERVER             ex: ftp.seudominio.com.br
#   FTP_USERNAME           usuário FTP da Hostinger
#   FTP_PASSWORD           senha FTP da Hostinger
#   FTP_STAGING_PATH       caminho remoto  ex: /staging/
#   VITE_SUPABASE_URL
#   VITE_SUPABASE_PUBLISHABLE_KEY
# ─────────────────────────────────────────────────────────────────

jobs:
  deploy-staging:
    name: Build + Deploy Staging
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Upload para Hostinger (Staging) via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ${{ secrets.FTP_STAGING_PATH }}
          # Deleta arquivos remotos que não existem mais no build
          dangerous-clean-slate: false

      - name: Comentar URL de staging no PR
        uses: actions/github-script@v7
        with:
          script: |
            const stagingUrl = "https://staging.${{ secrets.FTP_SERVER_DOMAIN }}";
            const body = [
              "## Ambiente de Teste disponível",
              "",
              `**URL:** ${stagingUrl}`,
              "",
              "Este ambiente reflete o último commit deste PR.",
              "Revise as mudanças e aprove o PR para fazer deploy em produção.",
            ].join("\n");

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.login === "github-actions[bot]" &&
              c.body.includes("Ambiente de Teste disponível")
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
